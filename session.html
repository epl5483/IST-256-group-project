<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <title>Conservation Events | Registration</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

   <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

   <header class="bg-success text-white py-4">
      <div class="container d-flex justify-content-between align-items-center">
         <h2 class="fw-bold m-0">Wildlife Conservation Events</h2>
         <div>
            <a href="index.html" class="btn btn-light me-2">Home</a>
            <a href="events.html" class="btn btn-dark">Events</a>
         </div>
      </div>
   </header>

   <div class="container text-center mt-5">
      <h1>Register for Conservation Events</h1>
   </div>

   <div class="container my-4">
      <div class="input-group">
         <input type="text" id="searchInput" class="form-control" placeholder="Search events...">
         <button class="btn btn-success" onclick="searchEvents()">Search</button>
      </div>
   </div>

   <div class="container my-5">
      <div class="card shadow-lg p-4">
         <h2 class="text-center mb-4">Event Registration</h2>

         <form id="eventForm" class="row g-3">

            <div class="col-md-6">
               <label class="form-label">Event Title *</label>
               <input type="text" class="form-control" id="eventTitle" required>
            </div>

            <div class="col-md-6">
               <label class="form-label">Event ID *</label>
               <input type="text" class="form-control" id="eventID" required>
            </div>

            <div class="col-md-6">
               <label class="form-label">Category *</label>
               <select class="form-select" id="category" required>
               <option value="">Choose...</option>
               <option>Workshop</option>
               <option>Seminar</option>
               <option>Social Event</option>
               <option>Educational</option>
            </select>
            </div>

            <div class="col-md-6">
               <label class="form-label">Duration *</label>
               <input type="text" class="form-control" id="duration" required>
            </div>

            <div class="col-md-6">
               <label class="form-label">Price *</label>
               <input type="text" class="form-control" id="price" required>
            </div>

            <div class="col-12 text-center mt-3">
               <button class="btn btn-success btn-lg" type="submit">Save Event</button>
               <button class="btn btn-secondary btn-lg" type="reset">Clear</button>
            </div>

         </form>
      </div>
   </div>

   <div class="container text-center my-5">
      <h3 class="mb-3">Available Events</h3>
      <div class="row" id="eventCards"></div>
   </div>

   <footer class="bg-dark text-white text-center py-3">
      <p>&copy; 2026 Wildlife Conservation Initiative</p>
   </footer>

   <script src="session.js"></script>

</body>

</html>
