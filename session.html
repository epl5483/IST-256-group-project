<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <title>Session | Conservation Events</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<header class="bg-success text-white py-4">
   <div class="container d-flex justify-content-between align-items-center">
      <h2 class="fw-bold m-0">Wildlife Conservation Events</h2>

      <div>
         <a href="index.html" class="btn btn-light me-2">Home</a>
         <a href="signup.html" class="btn btn-dark me-2">Sign Up</a>
         <a href="session.html" class="btn btn-success">Session</a>
      </div>
   </div>
</header>

<div class="container text-center mt-5">
   <h1>Session Management</h1>
</div>

<div class="container my-5">
   <div class="card shadow-lg p-4">
      <h2 class="text-center mb-4">Event Session Form</h2>

      <form id="signupForm" class="row g-3">

         <div class="col-md-6">
            <label class="form-label">Session ID *</label>
            <input type="text" class="form-control" id="sessionID" required>
            <small class="text-danger" id="sessionIDError"></small>
         </div>

         <div class="col-md-6">
            <label class="form-label">Session Title *</label>
            <input type="text" class="form-control" id="sessionTitle" required>
            <small class="text-danger" id="sessionTitleError"></small>
         </div>

         <div class="col-md-6">
            <label class="form-label">Workshop *</label>
            <input type="text" class="form-control" id="workshop" required>
            <small class="text-danger" id="workshopError"></small>
         </div>

         <div class="col-md-6">
            <label class="form-label">Duration *</label>
            <input type="text" class="form-control" id="duration" required>
            <small class="text-danger" id="durationError"></small>
         </div>

         <div class="col-md-6">
            <label class="form-label">Registration Fee *</label>
            <input type="text" class="form-control" id="registrationFee" required>
            <small class="text-danger" id="registrationFeeError"></small>
         </div>

         <div class="col-md-6">
            <label class="form-label">Speaker *</label>
            <input type="text" class="form-control" id="speaker" required>
            <small class="text-danger" id="speakerError"></small>
         </div>

         <div class="col-12">
            <label class="form-label">Additional Info</label>
            <textarea class="form-control" id="additionalInfo" rows="3"></textarea>
         </div>

         <div class="col-12 text-center mt-3">
            <button class="btn btn-success btn-lg" type="submit">Save Session</button>
            <button class="btn btn-secondary btn-lg" type="reset">Clear</button>
         </div>

      </form>
   </div>
</div>

<div class="container text-center my-5">
   <h3 class="mb-3">Available Sessions</h3>
   <div id="sessionCard"></div>
</div>

<footer class="bg-dark text-white text-center py-3">
   <p>&copy; 2026 Wildlife Conservation Initiative</p>
</footer>

<script src="session.js"></script>

</body>
</html>
