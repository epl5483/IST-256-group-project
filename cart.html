<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Shopping Cart | Wildlife Conservation</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <style>
      /* Custom styles to match your screenshot exactly */
      .cart-header {
         background-color: #4A90E2 !important;
      }

      /* Blue header */
      .btn-add {
         background-color: #4A90E2;
         border: none;
      }

      .btn-checkout {
         background-color: #438157;
         border: none;
      }

      /* Darker green */
      .price-text {
         color: #438157;
         font-weight: bold;
      }
   </style>
</head>

<body class="bg-light">

   <header class="bg-success text-white py-4 mb-4">
      <div class="container d-flex justify-content-between align-items-center">
         <h2 class="fw-bold m-0">Shopping Cart</h2>
         <nav>
            <a href="index.html" class="btn btn-outline-light me-2">Home</a>
            <a href="session.html" class="btn btn-outline-light me-2">Sessions</a>
            <a href="cart.html" class="btn btn-light">Cart</a>
         </nav>
      </div>
   </header>

   <main class="container">
      <p class="text-center text-muted mb-5">Browse products, add to cart, and checkout using jQuery & AJAX</p>

      <div class="row">
         <div class="col-md-8">
            <h3 class="mb-4">Browse Products</h3>

            <div class="card mb-4 p-4 shadow-sm">
               <label class="form-label fw-bold">Search Products:</label>
               <input type="text" id="searchInput" class="form-control" placeholder="Type to search products...">
            </div>

            <div id="productList"></div>
         </div>

         <div class="col-md-4">
            <div class="card shadow border-0">
               <div class="card-header cart-header text-white py-3">
                  <h5 class="m-0">Your Cart</h5>
               </div>
               <div class="card-body">
                  <div id="cartContents">
                     <p class="text-muted">Your cart is empty</p>
                  </div>
                  <hr>
                  <div class="d-flex justify-content-between align-items-center fw-bold fs-5">
                     <span>Total:</span>
                     <span id="cartTotal">$0.00</span>
                  </div>
                  <button id="checkoutBtn" class="btn btn-success btn-checkout w-100 mt-4 py-2">Checkout (AJAX Demo)</button>
               </div>
            </div>
         </div>
      </div>
   </main>

   <footer class="bg-dark text-white text-center py-3 mt-5">
      <p>&copy; 2026 Wildlife Conservation Initiative</p>
   </footer>

   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
   <script src="cart.js"></script>

</body>

</html>
